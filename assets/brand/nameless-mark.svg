<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Nameless">
  <title>Nameless</title>
  <defs>
    <linearGradient id="nmGold" x1="18" y1="12" x2="46" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8d3a0"/>
      <stop offset="0.5" stop-color="#c2a367"/>
      <stop offset="1" stop-color="#7f6236"/>
    </linearGradient>
  </defs>

  <!-- Cercle brisé (discret) -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="url(#nmGold)" stroke-opacity="0.32"
          stroke-width="1.6" stroke-dasharray="70 14 40 14" stroke-linecap="round"/>

  <!-- Lame verticale subtile, derrière le N -->
  <path d="M32 8 L33.6 32 L32 56 L30.4 32 Z" fill="url(#nmGold)" opacity="0.4"/>

  <!-- Monogramme N (plein, lisible) -->
  <g fill="url(#nmGold)">
    <rect x="17" y="15" width="8" height="34" rx="1.5"/>
    <rect x="39" y="15" width="8" height="34" rx="1.5"/>
    <path d="M17 15 L25 15 L47 49 L39 49 Z"/>
  </g>

  <!-- Accents bleu acier discrets -->
  <circle cx="32" cy="5" r="1.7" fill="#6f92b3"/>
  <circle cx="32" cy="59" r="1.7" fill="#6f92b3"/>
</svg>
