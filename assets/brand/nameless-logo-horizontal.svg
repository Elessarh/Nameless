<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 336 72" role="img" aria-label="Nameless">
  <title>Nameless</title>
  <defs>
    <linearGradient id="hMark" x1="18" y1="12" x2="46" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8d3a0"/>
      <stop offset="0.5" stop-color="#c2a367"/>
      <stop offset="1" stop-color="#7f6236"/>
    </linearGradient>
    <linearGradient id="hText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e4cd97"/>
      <stop offset="0.55" stop-color="#c2a367"/>
      <stop offset="1" stop-color="#8a6c3c"/>
    </linearGradient>
  </defs>

  <!-- Marque -->
  <g transform="translate(4,4)">
    <circle cx="32" cy="32" r="27" fill="none" stroke="url(#hMark)" stroke-opacity="0.32"
