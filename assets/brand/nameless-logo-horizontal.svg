      <rect x="39" y="15" width="8" height="34" rx="1.5"/>
      <path d="M17 15 L25 15 L47 49 L39 49 Z"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="84" y="47" font-family="Cinzel, Georgia, 'Times New Roman', serif"
        font-size="30" font-weight="600" letter-spacing="7" fill="url(#hText)">NAMELESS</text>
