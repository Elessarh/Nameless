name: Deploy public site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build allow-listed public artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -R assets css js pages _site/
          cp index.html 404.html CNAME .nojekyll _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload public artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
